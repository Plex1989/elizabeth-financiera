<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Préstamos Vía Nómina | Elizabeth De Victorio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            gold: '#d4af37',
                            blue: '#2563eb'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componente de Icono para que funcione con CDN
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, []);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        function App() {
            const handleWhatsApp = () => {
                const message = "Hola Lic. Elizabeth, vi su página y me interesa recibir asesoría para un préstamo vía nómina o domiciliado.";
                window.open(`https://wa.me/522282779228?text=${encodeURIComponent(message)}`, '_blank');
            };

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    {/* Navegación */}
                    <nav className="bg-white border-b border-slate-200 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex flex-col">
                                <span className="text-xl font-black text-slate-900 tracking-tighter uppercase leading-none">
                                    Elizabeth <span className="text-blue-600">De Victorio</span>
                                </span>
                                <span className="text-[10px] font-bold tracking-[0.3em] text-slate-400 mt-1 uppercase">Asesor Financiero</span>
                            </div>
                            <button onClick={handleWhatsApp} className="bg-[#25d366] text-white px-5 py-2 rounded-full text-xs font-black flex items-center gap-2 shadow-lg">
                                <Icon name="message-circle" size={18} />
                                <span className="hidden sm:inline">WhatsApp</span>
                            </button>
                        </div>
                    </nav>

                    {/* Hero */}
                    <section className="bg-brand-dark text-white py-20 px-6 relative overflow-hidden text-center lg:text-left">
                        <div className="absolute inset-0 opacity-10 bg-[radial-gradient(#d4af37_1px,transparent_1px)] [background-size:24px_24px]"></div>
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 items-center relative z-10">
                            <div>
                                <h1 className="text-4xl md:text-6xl font-black mb-8 leading-tight italic uppercase tracking-tighter">
                                    PRESTAMOS VIA <span className="text-brand-gold not-italic">NOMINA</span> Y DOMICILIADOS
                                </h1>
                                <div className="bg-white/5 border-l-4 border-brand-gold p-6 rounded-r-2xl mb-10">
                                    <p className="text-slate-300 text-lg md:text-xl italic">
                                        "Crédito para jubilados pensionados, trabajadores activos de gobierno estatal y federal e iniciativa privada"
                                    </p>
                                </div>
                                <button onClick={handleWhatsApp} className="bg-brand-gold text-brand-dark px-10 py-5 rounded-2xl font-black uppercase tracking-widest text-sm hover:bg-white transition-all shadow-xl flex items-center justify-center gap-3 mx-auto lg:mx-0">
                                    Solicitar mi Crédito <Icon name="arrow-right" size={18} />
                                </button>
                            </div>
                            <div className="hidden lg:block bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                                <h3 className="text-brand-gold font-black text-xs uppercase tracking-widest mb-6">Ventajas Reales</h3>
                                <div className="space-y-6">
                                    <div className="flex gap-4"><Icon name="check-circle-2" className="text-blue-500" /><p className="text-sm">Atención humana, no bots.</p></div>
                                    <div className="flex gap-4"><Icon name="check-circle-2" className="text-blue-500" /><p className="text-sm">Sin letras chiquitas.</p></div>
                                    <div className="flex gap-4"><Icon name="check-circle-2" className="text-blue-500" /><p className="text-sm">Respuesta rápida.</p></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Instituciones */}
                    <section className="py-12 bg-white border-b border-slate-100">
                        <div className="max-w-7xl mx-auto px-6 flex flex-wrap justify-center gap-10 opacity-50 grayscale">
                            <span className="font-black text-xl italic tracking-tighter">PEMEX</span>
                            <span className="font-black text-xl italic tracking-tighter">IMSS</span>
                            <span className="font-black text-xl italic tracking-tighter">ISSSTE</span>
                            <span className="font-black text-xl italic tracking-tighter">CFE</span>
                            <span className="font-black text-xl italic tracking-tighter">IPE</span>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-brand-dark text-slate-500 py-16 px-6 text-center mt-auto">
                        <p className="text-white font-serif italic text-3xl font-black mb-2">Elizabeth</p>
                        <p className="text-brand-gold text-[10px] font-bold tracking-[0.4em] uppercase mb-10">DE VICTORIO</p>
                        <div className="bg-slate-900 inline-block p-6 rounded-2xl border border-slate-800 mb-8">
                            <p className="text-xs text-slate-400 uppercase tracking-widest mb-2">Teléfono de Atención</p>
                            <p className="text-2xl font-black text-white">228 277 9228</p>
                        </div>
                        <p className="text-[9px] opacity-30 tracking-widest uppercase mt-10">&copy; 2026 ELIZABETH DE VICTORIO</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
