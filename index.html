<!DOCTYPE html>

    <script>

            theme: {
                extend: {
                    colors: {
                        navy: {

                            light: '#1e293b',
                            dark: '#020617'

                        brandGold: '#d4af37',

            background-image: radial-gradient(rgba(212, 175, 55, 0.1) 1px, transparent 1px);

<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

                            <div className="flex flex-col items-center gap-6">
                                <button onClick={handleWhatsApp} className="bg-waGreen text-white px-12 py-7 rounded-[2.5rem] font-black uppercase tracking-widest text-lg hover:scale-105 transition-all shadow-2xl shadow-green-200 flex items-center gap-4">
                                    <Icon name="message-circle" size={32} />

                                <div className="flex items-center gap-8 text-slate-400 font-bold uppercase text-[10px] tracking-widest">

</body>
